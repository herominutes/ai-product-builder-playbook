<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Artifacts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0c;
  --surface: #151515;
  --line: rgba(255,255,255,0.09);
  --line-mid: rgba(255,255,255,0.16);
  --accent: #e8ff47;
  --accent-dim: rgba(232,255,71,0.12);
  --accent-hover: rgba(232,255,71,0.22);
  --text: #c8c8be;
  --text-bright: #f2f2ea;
  --muted: #7a7a70;
  --dim: rgba(208,208,196,0.18);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:400;font-size:14px;line-height:1.65;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── Layout ── */
.shell{display:grid;grid-template-columns:200px 1fr;grid-template-rows:auto 1fr;min-height:100vh}

/* ── Header ── */
.header{grid-column:1/-1;padding:44px 52px 32px;border-bottom:1px solid var(--line);display:flex;align-items:flex-end;justify-content:space-between;gap:2rem}
.wordmark{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:32px;letter-spacing:-0.01em;color:var(--text-bright);line-height:1;margin-bottom:8px}
.wordmark em{font-style:italic;color:var(--accent)}
.header-sub{color:var(--muted);font-size:12px;letter-spacing:0.13em;text-transform:uppercase}

/* view toggle */
.view-toggle{display:flex;border:1px solid var(--line-mid);border-radius:3px;overflow:hidden}
.view-btn{font-family:'DM Sans',sans-serif;font-weight:400;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 18px;background:transparent;color:var(--muted);border:none;cursor:pointer;transition:all .15s}
.view-btn:hover{color:var(--text-bright)}
.view-btn.active{background:var(--accent);color:#0c0c0c}

/* ── Sidebar ── */
.sidebar{grid-column:1;grid-row:2;border-right:1px solid var(--line);padding:36px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar::-webkit-scrollbar{width:0}
.nav-label{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);padding:0 28px;margin-bottom:14px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:9px 28px;font-size:13px;color:var(--muted);text-decoration:none;cursor:pointer;transition:color .15s;letter-spacing:0.01em;border-left:1px solid transparent}
.nav-item:hover{color:var(--text-bright)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent)}
.nav-count{font-size:11px;color:var(--muted)}
.nav-item.active .nav-count{color:rgba(232,255,71,0.5)}

/* ── Main ── */
.main{grid-column:2;grid-row:2;padding:44px 52px}

/* ── VIEW: FLOW ── */
#view-flow{display:block}
#view-list{display:none}

/* Phase row */
.phase-row{margin-bottom:52px}
.phase-label{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.phase-num{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:22px;color:var(--accent);line-height:1;min-width:22px}
.phase-title{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:19px;color:var(--text-bright);letter-spacing:0.01em}
.phase-desc{font-size:12px;color:var(--muted);margin-left:auto;letter-spacing:0.04em}
.phase-line{height:1px;background:var(--line);margin-bottom:20px}

/* Artifact nodes */
.node-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.artifact-node{position:relative;background:var(--surface);border:1px solid var(--line-mid);border-radius:4px;padding:16px 18px;cursor:pointer;text-decoration:none;display:block;transition:border-color .18s,background .18s}
.artifact-node:hover{border-color:var(--accent);background:rgba(232,255,71,0.04)}
.artifact-node:hover .node-arrow{opacity:1}
.node-tag{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.node-name{font-size:14px;color:var(--text-bright);letter-spacing:0.01em;line-height:1.4;font-weight:400}
.node-when{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
.node-arrow{position:absolute;top:14px;right:14px;font-size:11px;color:var(--accent);opacity:0;transition:opacity .15s}

/* Flow connector between phases */
.phase-connector{display:flex;align-items:center;gap:8px;margin:-28px 0 28px 0;padding-left:4px}
.phase-connector-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(232,255,71,0.2),transparent)}
.phase-connector-text{font-size:11px;color:var(--muted);letter-spacing:0.06em;white-space:nowrap}

/* ── VIEW: LIST ── */
.search-wrap{position:relative;margin-bottom:36px}
.search-icon{position:absolute;left:0;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
input[type="search"]{width:100%;max-width:380px;background:transparent;border:none;border-bottom:1px solid var(--line-mid);color:var(--text-bright);font-family:'DM Sans',sans-serif;font-weight:400;font-size:14px;padding:8px 0 8px 22px;outline:none;transition:border-color .2s;letter-spacing:0.02em}
input[type="search"]:focus{border-bottom-color:var(--accent)}
input[type="search"]::placeholder{color:var(--muted)}
input[type="search"]::-webkit-search-cancel-button{display:none}

.list-section{margin-bottom:44px}
.list-section-header{display:flex;align-items:baseline;gap:14px;margin-bottom:4px;padding-bottom:12px;border-bottom:1px solid var(--line-mid)}
.list-section-name{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:19px;color:var(--text-bright)}
.list-section-count{font-size:11px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-left:auto}
.list-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line);text-decoration:none;transition:border-bottom-color .15s;gap:1rem}
.list-row:hover{border-bottom-color:rgba(232,255,71,0.3)}
.list-row:hover .list-name{color:var(--text-bright)}
.list-row:hover .list-arrow{opacity:1;transform:translate(2px,-2px)}
.list-name{font-size:14px;color:var(--text);letter-spacing:0.01em;transition:color .15s}
.list-right{display:flex;align-items:center;gap:18px;flex-shrink:0}
.list-path{font-size:11px;color:var(--muted);letter-spacing:0.03em}
.list-arrow{font-size:11px;color:var(--accent);opacity:0;transition:opacity .15s,transform .15s}
.empty{color:var(--muted);font-size:13px;padding:48px 0;letter-spacing:0.04em;display:none}

/* Stats row */
.stats-row{display:flex;gap:36px;margin-bottom:40px;padding-bottom:32px;border-bottom:1px solid var(--line)}
.stat-n{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:28px;color:var(--text-bright);line-height:1}
.stat-l{font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:5px}

@media(max-width:800px){
  .shell{grid-template-columns:1fr}
  .header{padding:32px 24px 24px;flex-direction:column;align-items:flex-start}
  .sidebar{display:none}
  .main{padding:32px 24px;grid-column:1}
  .node-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){.node-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">

<!-- Header -->
<header class="header">
  <div>
    <div class="wordmark">Product <em>Artifacts</em></div>
    <div class="header-sub">Knowledge Repository</div>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" onclick="setView('flow',this)">Process flow</button>
    <button class="view-btn" onclick="setView('list',this)">All artifacts</button>
  </div>
</header>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="nav-label" id="sb-label">Phases</div>
  <nav id="navList"></nav>
</aside>

<!-- Main -->
<main class="main">

  <!-- FLOW VIEW -->
  <div id="view-flow">
    <div id="flow-content"></div>
  </div>

  <!-- LIST VIEW -->
  <div id="view-list">
    <div class="stats-row">
      <div><div class="stat-n">43</div><div class="stat-l">Artifacts</div></div>
      <div><div class="stat-n">10</div><div class="stat-l">Categories</div></div>
      <div><div class="stat-n" id="visCount">43</div><div class="stat-l">Visible</div></div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="search" id="searchInput" placeholder="Search artifacts..." autocomplete="off" spellcheck="false">
    </div>
    <div id="list-content"></div>
    <div class="empty" id="empty">No artifacts match your search.</div>
  </div>

</main>
</div>

<script>
const REPO = './';

/* ─────────────────────────────────────────────
   PROCESS FLOW DATA
   Each phase = a stage in the product lifecycle.
   Each artifact = when/why to use it.
   ───────────────────────────────────────────── */
const phases = [
  {
    id: 'strategy',
    num: '01',
    title: 'Strategy & vision',
    desc: 'Where are we going?',
    connector: 'Define the opportunity → set direction',
    artifacts: [
      { name: 'Product vision narrative',    folder: 'strategy',          file: 'product-vision-narrative',    when: 'Use to align leadership on long-term direction' },
      { name: 'Product opportunity assessment', folder: 'strategy',       file: 'product-opportunity-assessment', when: 'Use when evaluating whether to pursue a new bet' },
      { name: 'Product strategy framework', folder: 'strategy',           file: 'product-strategy-framework',  when: 'Use to translate vision into strategic priorities' },
      { name: 'North star metrics',          folder: 'analytics',         file: 'north-star-metrics',          when: 'Use to anchor the team on what success looks like' },
      { name: 'AI transformation roadmap',  folder: 'consulting',        file: 'ai-transformation-roadmap',   when: 'Use when planning an org-wide AI adoption journey' },
    ]
  },
  {
    id: 'discovery',
    num: '02',
    title: 'Discovery & research',
    desc: 'What do users really need?',
    connector: 'Understand the problem → frame the solution space',
    artifacts: [
      { name: 'Customer journey mapping',   folder: 'discovery',         file: 'customer-journey-mapping',    when: 'Use to visualise the end-to-end user experience' },
      { name: 'User personas',              folder: 'discovery',         file: 'user-personas',               when: 'Use to ground decisions in real user archetypes' },
      { name: 'Jobs to be done',            folder: 'discovery',         file: 'jobs-to-be-done',             when: 'Use to uncover the underlying motivation behind behaviour' },
      { name: 'Problem framing framework',  folder: 'discovery',         file: 'problem-framing-framework',   when: 'Use before solutioning to sharpen problem clarity' },
      { name: 'Human-centered design',      folder: 'discovery',         file: 'human-centered-design',       when: 'Use as a design philosophy guide for the team' },
      { name: 'Design thinking',            folder: 'discovery',         file: 'design-thinking',             when: 'Use to structure creative problem-solving workshops' },
    ]
  },
  {
    id: 'architecture',
    num: '03',
    title: 'AI architecture & evaluation',
    desc: 'How do we build it right?',
    connector: 'Design the system → validate it works',
    artifacts: [
      { name: 'AI capability maturity model', folder: 'consulting',      file: 'ai-capability-maturity-model', when: 'Use to assess your team\'s current AI readiness' },
      { name: 'AI product strategy playbook', folder: 'consulting',      file: 'ai-product-strategy-playbook', when: 'Use when defining how AI fits into your product' },
      { name: 'AI orchestration',           folder: 'ai-architecture',   file: 'ai-orchestration',            when: 'Use when designing multi-step AI workflows' },
      { name: 'Multi-agent system',         folder: 'ai-architecture',   file: 'multi-agent-system',          when: 'Use for complex tasks requiring specialised agents' },
      { name: 'RAG framework',              folder: 'ai-architecture',   file: 'rag-framework',               when: 'Use when grounding AI responses in your own data' },
      { name: 'AI guardrails',              folder: 'ai-architecture',   file: 'ai-guardrails',               when: 'Use to define safety and quality boundaries' },
      { name: 'AI memory system',           folder: 'ai-architecture',   file: 'ai-memory-system',            when: 'Use when your AI needs persistent context across sessions' },
      { name: 'LLM evaluation framework',   folder: 'ai-evaluation',     file: 'llm-evaluation-framework',    when: 'Use to systematically score model outputs' },
      { name: 'Prompt testing',             folder: 'ai-evaluation',     file: 'prompt-testing',              when: 'Use to validate prompts before shipping' },
      { name: 'AI risk framework',          folder: 'ai-evaluation',     file: 'ai-risk-framework',           when: 'Use to identify and mitigate AI-specific risks' },
      { name: 'AI monitoring',              folder: 'ai-evaluation',     file: 'ai-monitoring',               when: 'Use to track model health and drift in production' },
    ]
  },
  {
    id: 'documentation',
    num: '04',
    title: 'Planning & documentation',
    desc: 'What exactly are we building?',
    connector: 'Specify the work → structure decisions',
    artifacts: [
      { name: 'AI PRD template',            folder: 'documentation',     file: 'ai-prd-template',             when: 'Use to write a product requirements document for AI features' },
      { name: 'Technical design doc',       folder: 'documentation',     file: 'technical-design-doc',        when: 'Use before engineering begins to align on approach' },
      { name: 'System architecture template', folder: 'documentation',   file: 'system-architecture-template', when: 'Use to document how components fit together' },
      { name: 'Decision log',               folder: 'documentation',     file: 'decision-log',                when: 'Use to record key decisions and their rationale' },
      { name: 'Product KPIs',               folder: 'analytics',         file: 'product-kpis',                when: 'Use to define measurable success criteria per feature' },
    ]
  },
  {
    id: 'execution',
    num: '05',
    title: 'Execution & delivery',
    desc: 'How do we ship with confidence?',
    connector: 'Prioritise → build → launch',
    artifacts: [
      { name: 'Prioritization framework',   folder: 'execution',         file: 'prioritization-framework',    when: 'Use to rank the backlog objectively' },
      { name: 'Roadmap framework',          folder: 'execution',         file: 'roadmap-framework',           when: 'Use to build and communicate the delivery plan' },
      { name: 'Product decision framework', folder: 'execution',         file: 'product-decision-framework',  when: 'Use when a high-stakes call must be made quickly' },
      { name: 'Experimentation framework',  folder: 'execution',         file: 'experimentation-framework',   when: 'Use to design and analyse A/B tests rigorously' },
      { name: 'Product launch playbook',    folder: 'execution',         file: 'product-launch-playbook',     when: 'Use to coordinate go-to-market and launch readiness' },
    ]
  },
  {
    id: 'leadership',
    num: '06',
    title: 'Leadership & governance',
    desc: 'How do we operate at scale?',
    connector: 'Align the org → sustain momentum',
    artifacts: [
      { name: 'Product operating model',    folder: 'product-leadership', file: 'product-operating-model',    when: 'Use to define how the product org runs day-to-day' },
      { name: 'Product governance',         folder: 'product-leadership', file: 'product-governance',         when: 'Use to establish escalation paths and guardrails' },
      { name: 'Product decision-making',    folder: 'product-leadership', file: 'product-decision-making',    when: 'Use to codify how decisions get made across levels' },
      { name: 'Communication & handoffs',   folder: 'product-leadership', file: 'communication-and-handoffs', when: 'Use to reduce context loss between teams' },
      { name: 'Product review framework',   folder: 'product-leadership', file: 'product-review-framework',   when: 'Use for structured reviews of product performance' },
      { name: 'AI builder principles',      folder: 'principles',         file: 'ai-builder-principles',      when: 'Use to align the team on how to build AI responsibly' },
      { name: 'Responsible AI principles',  folder: 'principles',         file: 'responsible-ai-principles',  when: 'Use as an ethical foundation for AI product decisions' },
      { name: 'Product principles',         folder: 'principles',         file: 'product-principles',         when: 'Use to define the team\'s product philosophy' },
    ]
  },
  {
    id: 'analytics',
    num: '07',
    title: 'Learning & iteration',
    desc: 'Are we getting better?',
    connector: null,
    artifacts: [
      { name: 'Retention analysis',         folder: 'analytics',         file: 'retention-analysis',          when: 'Use to diagnose why users churn and when' },
      { name: 'Product learning system',    folder: 'analytics',         file: 'product-learning-system',     when: 'Use to institutionalise how insights flow back to the roadmap' },
      { name: 'AI monitoring',              folder: 'ai-evaluation',     file: 'ai-monitoring',               when: 'Use to detect model degradation post-launch' },
    ]
  },
];

/* ─────────────────────────────────────────────
   ALL CATEGORIES (for list view sidebar)
   ───────────────────────────────────────────── */
const categories = [
  { id: 'ai-architecture',    name: 'AI Architecture',    files: ['ai-guardrails','ai-memory-system','ai-orchestration','multi-agent-system','rag-framework'] },
  { id: 'ai-evaluation',      name: 'AI Evaluation',      files: ['ai-monitoring','ai-risk-framework','llm-evaluation-framework','prompt-testing'] },
  { id: 'analytics',          name: 'Analytics',          files: ['north-star-metrics','product-kpis','product-learning-system','retention-analysis'] },
  { id: 'consulting',         name: 'Consulting',         files: ['ai-capability-maturity-model','ai-product-strategy-playbook','ai-transformation-roadmap'] },
  { id: 'discovery',          name: 'Discovery',          files: ['customer-journey-mapping','design-thinking','human-centered-design','jobs-to-be-done','problem-framing-framework','user-personas'] },
  { id: 'documentation',      name: 'Documentation',      files: ['ai-prd-template','decision-log','system-architecture-template','technical-design-doc'] },
  { id: 'execution',          name: 'Execution',          files: ['experimentation-framework','prioritization-framework','product-decision-framework','product-launch-playbook','roadmap-framework'] },
  { id: 'principles',         name: 'Principles',         files: ['ai-builder-principles','product-principles','responsible-ai-principles'] },
  { id: 'product-leadership', name: 'Product Leadership', files: ['communication-and-handoffs','product-decision-making','product-governance','product-operating-model','product-review-framework'] },
  { id: 'strategy',           name: 'Strategy',           files: ['product-opportunity-assessment','product-strategy-framework','product-vision-narrative'] },
];

function toTitle(s) {
  return s.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

/* ── View switching ── */
let currentView = 'flow';
function setView(v, btn) {
  currentView = v;
  document.getElementById('view-flow').style.display = v === 'flow' ? 'block' : 'none';
  document.getElementById('view-list').style.display = v === 'list' ? 'block' : 'none';
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildSidebar(v);
}

/* ── Sidebar ── */
function buildSidebar(v) {
  const nav = document.getElementById('navList');
  const label = document.getElementById('sb-label');
  nav.innerHTML = '';
  if (v === 'flow') {
    label.textContent = 'Phases';
    phases.forEach(p => {
      const a = document.createElement('a');
      a.className = 'nav-item';
      a.href = `#phase-${p.id}`;
      a.dataset.id = p.id;
      a.innerHTML = `<span>${p.num} ${p.title.split(' ')[0]}</span><span class="nav-count">${p.artifacts.length}</span>`;
      nav.appendChild(a);
    });
  } else {
    label.textContent = 'Categories';
    categories.forEach(cat => {
      const a = document.createElement('a');
      a.className = 'nav-item';
      a.href = `#cat-${cat.id}`;
      a.dataset.id = cat.id;
      a.innerHTML = `<span>${cat.name}</span><span class="nav-count">${cat.files.length}</span>`;
      nav.appendChild(a);
    });
  }
  // scroll spy
  setTimeout(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const id = e.target.id.replace('phase-','').replace('cat-','');
          document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.id === id));
        }
      });
    }, { threshold: 0.3 });
    document.querySelectorAll('[id^="phase-"],[id^="cat-"]').forEach(s => obs.observe(s));
  }, 100);
}

/* ── Build Flow view ── */
function buildFlow() {
  const fc = document.getElementById('flow-content');
  fc.innerHTML = '';
  phases.forEach((phase, i) => {
    const row = document.createElement('div');
    row.className = 'phase-row';
    row.id = `phase-${phase.id}`;

    const nodes = phase.artifacts.map(a => {
      const href = `${REPO}${a.folder}/${a.file}.md`;
      return `
        <a class="artifact-node" href="${href}">
          <div class="node-tag">${a.folder}</div>
          <div class="node-name">${a.name}</div>
          <div class="node-when">${a.when}</div>
          <span class="node-arrow">↗</span>
        </a>`;
    }).join('');

    row.innerHTML = `
      <div class="phase-label">
        <span class="phase-num">${phase.num}</span>
        <span class="phase-title">${phase.title}</span>
        <span class="phase-desc">${phase.desc}</span>
      </div>
      <div class="phase-line"></div>
      <div class="node-grid">${nodes}</div>
    `;

    fc.appendChild(row);

    if (phase.connector) {
      const conn = document.createElement('div');
      conn.className = 'phase-connector';
      conn.innerHTML = `<div class="phase-connector-line"></div><span class="phase-connector-text">↓ ${phase.connector}</span><div class="phase-connector-line" style="background:linear-gradient(270deg,rgba(232,255,71,0.25),transparent)"></div>`;
      fc.appendChild(conn);
    }
  });
}

/* ── Build List view ── */
let listQuery = '';
function buildList() {
  const content = document.getElementById('list-content');
  const empty = document.getElementById('empty');
  content.innerHTML = '';
  let total = 0;
  categories.forEach(cat => {
    const matches = cat.files.filter(f =>
      !listQuery || f.includes(listQuery) || cat.name.toLowerCase().includes(listQuery)
    );
    if (!matches.length) return;
    total += matches.length;
    const sec = document.createElement('div');
    sec.className = 'list-section';
    sec.id = `cat-${cat.id}`;
    sec.innerHTML = `
      <div class="list-section-header">
        <span class="list-section-name">${cat.name}</span>
        <span class="list-section-count">${matches.length}</span>
      </div>
      ${matches.map(f => `
        <a class="list-row" href="${REPO}${cat.id}/${f}.md">
          <span class="list-name">${toTitle(f)}</span>
          <span class="list-right">
            <span class="list-path">${cat.id}/${f}.md</span>
            <span class="list-arrow">↗</span>
          </span>
        </a>`).join('')}
    `;
    content.appendChild(sec);
  });
  empty.style.display = total === 0 ? 'block' : 'none';
  document.getElementById('visCount').textContent = total;
}

document.getElementById('searchInput').addEventListener('input', function() {
  listQuery = this.value.trim().toLowerCase();
  buildList();
  buildSidebar('list');
});

/* ── Init ── */
buildFlow();
buildList();
buildSidebar('flow');
</script>
</body>
</html>
